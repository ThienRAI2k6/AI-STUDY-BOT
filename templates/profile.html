<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - AI Study Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            /* Màu nền tối sâu thẳm kiểu công nghệ cao */
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .profile-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 400px;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid #6366f1;
            object-fit: cover;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: #818cf8; outline: none; }
        
        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-save:hover { transform: translateY(-2px); }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>Thiết lập thông tin cá nhân</h2>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="avatar-preview">
                {% if user.profile_pic and user.profile_pic != 'default_avatar.png' %}
                    <img src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                {% else %}
                    <i class="fas fa-robot fa-4x" style="color: #6366f1;"></i>
                {% endif %}
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label style="font-size: 0.8rem; color: #94a3b8; margin-left: 5px;">Thay đổi ảnh nhận diện:</label>
                <input type="file" name="profile_pic" accept="image/*" style="font-size: 0.8rem;">
            </div>

            <input type="text" name="username" value="{{ user.username }}" placeholder="Tên hiển thị" required>
            
            <select name="gender">
                <option value="Nam" {% if user.gender == 'Nam' %}selected{% endif %}>Nam</option>
                <option value="Nữ" {% if user.gender == 'Nữ' %}selected{% endif %}>Nữ</option>
                <option value="Khác" {% if user.gender == 'Khác' %}selected{% endif %}>Khác</option>
            </select>

            <input type="number" name="dob_year" value="{{ user.dob_year }}" placeholder="Năm sinh (VD: 2005)">

            <button type="submit" class="btn-save">Xác nhận cập nhật</button>
        </form>

        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại Dashboard</a>
    </div>

</body>
</html>
